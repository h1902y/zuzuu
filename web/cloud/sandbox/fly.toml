# Fly app for webcode cloud sandboxes. One app, many Machines — the broker
# creates/starts one Machine per user session via the Machines API.
#
#   fly apps create webcode-sandbox
#   fly deploy -c hosted/sandbox/fly.toml          # builds & pushes the image
# Machines are then created on demand by the broker (not by `fly scale`).

app = "webcode-sandbox"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  # cost + abuse control: stop a Machine when idle, never keep a warm pool.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

# tiny preset — these are throwaway play VMs
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
