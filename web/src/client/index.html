<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>zuzuu workbench</title>
    <link rel="icon" type="image/png" href="/z.png" />
    <!-- the brand logotype face (Train One) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Train+One&display=swap" rel="stylesheet" />
    <script>
      // pre-paint: set the warm theme before React mounts (no flash). An explicit
      // choice in localStorage wins; otherwise follow the OS. Mirrors state/theme.ts.
      (function () {
        try {
          var pref = localStorage.getItem("zz-theme") || "system";
          var dark = pref === "dark" || (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
